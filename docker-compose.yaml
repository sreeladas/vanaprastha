services:
  payload:
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: payload-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    container_name: payload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  node_modules:
