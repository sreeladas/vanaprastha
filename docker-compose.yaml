services:
  app:
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: payload
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - next_cache:/app/.next
      - node_modules:/app/node_modules
      - ./public/media:/app/public/media
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:17
    ports:
      - '5432:5432'
    container_name: payload-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vanaprastha
      POSTGRES_PASSWORD: vanaprastha
      POSTGRES_DB: vanaprastha
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  node_modules:
  next_cache:
